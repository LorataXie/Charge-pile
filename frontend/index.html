<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能充电站调度计费系统</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/vue.global.prod.js"></script>
</head>
<body>
<div id="app">
    <!-- ====== LOGIN ====== -->
    <div v-if="!loggedIn" class="login-container card">
        <h2 style="text-align:center;margin-bottom:20px;color:#1a73e8">智能充电站调度计费系统</h2>
        <div class="tabs">
            <button class="tab" :class="{active: loginMode==='login'}" @click="loginMode='login'">登录</button>
            <button class="tab" :class="{active: loginMode==='register'}" @click="loginMode='register'">注册</button>
        </div>
        <div class="tabs" style="margin-top:10px">
            <button class="tab" :class="{active: loginForm.role==='client'}" @click="loginForm.role='client'">用户客户端</button>
            <button class="tab" :class="{active: loginForm.role==='admin'}" @click="loginForm.role='admin'">管理员客户端</button>
        </div>
        <div v-if="loginMsg" class="alert" :class="'alert-'+loginMsgType">{{ loginMsg }}</div>
        <div class="hint" style="margin-bottom:12px">
            当前入口：{{ loginForm.role==='admin'?'管理员客户端':'用户客户端' }}。
        </div>
        <div class="form-group"><label>用户名</label><input v-model="loginForm.username" @keyup.enter="doLogin"></div>
        <div class="form-group"><label>密码</label><input type="password" v-model="loginForm.password" @keyup.enter="doLogin"></div>
        <div v-if="loginMode==='register'" class="form-group">
            <label>角色</label><input value="客户" disabled style="background:#f1f3f4">
            <div class="hint">管理员账号需通过 CLI 创建：python cli/main.py create-admin</div>
        </div>
        <button class="btn btn-primary" style="width:100%" @click="doLogin">{{ loginMode==='login'?'登录':'注册' }}</button>
    </div>

    <!-- ====== MAIN ====== -->
    <div v-if="loggedIn">
        <div class="header">
            <h1>充电站调度计费系统</h1>
            <div class="user-info">
                <span>{{ user.username }} ({{ user.role==='admin'?'管理员':'客户' }})</span>
                <button class="btn btn-sm btn-danger" @click="logout">退出</button>
            </div>
        </div>
        <div class="container">
            <!-- Global Message -->
            <div v-if="globalMsg" class="alert" :class="'alert-'+globalMsgType" style="cursor:pointer" @click="globalMsg=''">{{ globalMsg }}</div>

            <!-- ====== CLIENT TABS ====== -->
            <template v-if="user.role==='client'">
                <div class="tabs">
                    <button class="tab" :class="{active: tab==='submit'}" @click="switchTab('submit')">提交请求</button>
                    <button class="tab" :class="{active: tab==='orders'}" @click="switchTab('orders')">我的订单</button>
                    <button class="tab" :class="{active: tab==='vehicles'}" @click="switchTab('vehicles')">我的车辆</button>
                    <button class="tab" :class="{active: tab==='piles'}" @click="switchTab('piles')">充电桩状态</button>
                    <button class="tab" :class="{active: tab==='detail'}" @click="switchTab('detail')">查看详单</button>
                </div>

                <!-- Submit Request -->
                <div v-if="tab==='submit'" class="card">
                    <h3>提交充电请求</h3>
                    <div class="form-row">
                        <div class="form-group"><label>选择车辆</label>
                            <select v-model="submitForm.vehicle_id" v-if="myVehicles.length">
                                <option :value="0" disabled>选择车辆</option>
                                <option v-for="v in myVehicles" :key="v.id" :value="v.id">
                                    {{ v.license_plate }} ({{ v.battery_capacity }}度)
                                </option>
                            </select>
                            <div v-else class="alert alert-info" style="margin:0">
                                暂无车辆，请先到 <a href="javascript:void(0)" @click="switchTab('vehicles')" style="color:#1a73e8;font-weight:bold">「我的车辆」</a> 创建车辆后再提交请求。
                            </div>
                        </div>
                        <div class="form-group"><label>充电模式</label>
                            <select v-model="submitForm.mode">
                                <option value="F">快充 (30度/小时)</option>
                                <option value="T">慢充 (10度/小时)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>请求充电量 (度)</label>
                            <input v-model.number="submitForm.requested_kwh" type="number" step="0.1" min="1">
                        </div>
                    </div>
                    <button class="btn btn-primary" @click="doSubmitOrder" :disabled="loading||!submitForm.vehicle_id">提交请求</button>
                    <!-- 计费时段说明 -->
                    <details style="margin-top:16px;padding:12px;background:#fffbf0;border:1px solid #f9ab00;border-radius:8px">
                        <summary style="cursor:pointer;font-weight:bold;color:#e37400">计费时段说明</summary>
                        <table style="margin-top:8px;font-size:13px">
                            <thead><tr><th>时段</th><th>时间</th><th>电价(元/度)</th><th>服务费(元/度)</th></tr></thead>
                            <tbody>
                                <tr style="color:#d93025"><td>峰时</td><td>10:00-15:00, 18:00-21:00</td><td>1.0</td><td>0.8</td></tr>
                                <tr style="color:#e37400"><td>平时</td><td>7:00-10:00, 15:00-18:00, 21:00-23:00</td><td>0.7</td><td>0.8</td></tr>
                                <tr style="color:#1e8e3e"><td>谷时</td><td>23:00-次日7:00</td><td>0.4</td><td>0.8</td></tr>
                            </tbody>
                        </table>
                        <div style="margin-top:4px;font-size:12px;color:#80868b">总费用 = 充电费(各时段电量×时段电价) + 服务费(总电量×0.8)</div>
                    </details>
                    <div v-if="submitResult" style="margin-top:12px;padding:16px;background:#e8f0fe;border-radius:8px">
                        <strong>提交成功!</strong><br>
                        排队号：<span style="font-size:22px;color:#1a73e8;font-weight:bold">{{ submitResult.queue_number }}</span><br>
                        订单ID：{{ submitResult.id }} | 状态：{{ statusMap[submitResult.status] }}
                        <span v-if="submitResult.pile_id"> | 分配至充电桩: {{ pileCode(submitResult.pile_id) }}</span>
                        <br><a href="javascript:void(0)" @click="switchTab('orders')" style="color:#1a73e8;text-decoration:underline">
                          前往「我的订单」查看实时状态（每5秒自动刷新）
                        </a>
                    </div>
                </div>

                <!-- Vehicles -->
                <div v-if="tab==='vehicles'" class="card">
                    <h3>我的车辆 <button class="btn btn-sm btn-primary" @click="loadMyVehicles" :disabled="loading" style="margin-left:12px">刷新</button></h3>
                    <div v-if="myVehicles.length" style="margin-bottom:12px">
                        <table><thead><tr><th>ID</th><th>车牌</th><th>电池容量(度)</th></tr></thead>
                        <tbody><tr v-for="v in myVehicles" :key="v.id"><td>{{ v.id }}</td><td>{{ v.license_plate }}</td><td>{{ v.battery_capacity }}</td></tr></tbody></table>
                    </div>
                    <div v-else style="color:#80868b;margin-bottom:12px">暂无车辆，请创建</div>
                    <h4>创建车辆</h4>
                    <div class="form-row">
                        <div class="form-group"><label>车牌号</label><input v-model="vehicleForm.license_plate" placeholder="京A BU556"></div>
                        <div class="form-group"><label>电池容量 (度)</label><input v-model.number="vehicleForm.battery_capacity" type="number" step="0.1" min="1" placeholder="60"></div>
                        <div class="form-group" style="display:flex;align-items:flex-end"><button class="btn btn-primary" @click="doCreateVehicle">创建车辆</button></div>
                    </div>
                </div>

                <!-- My Orders -->
                <div v-if="tab==='orders'" class="card">
                    <h3>我的订单 <button class="btn btn-sm btn-primary" @click="loadMyOrders" :disabled="loading" style="margin-left:12px">刷新</button> <small style="color:#80868b">(每5秒自动刷新)</small></h3>
                    <div class="hint" style="margin-bottom:8px">充电区（排队中/充电中）订单不可修改，需先取消后重新提交。状态随仿真 Tick 自动刷新。</div>
                    <table v-if="myOrders.length">
                        <thead><tr><th>ID</th><th>排队号</th><th>模式</th><th>请求量(度)</th><th>状态</th><th>充电桩</th><th>排队前车</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr v-for="o in myOrders" :key="o.id">
                                <td>{{ o.id }}</td><td><strong>{{ o.queue_number || '-' }}</strong></td>
                                <td>{{ o.mode==='F'?'快充':'慢充' }}</td><td>{{ o.requested_kwh }}</td>
                                <td><span class="status-badge" :class="'status-'+o.status">{{ statusMap[o.status] }}</span></td>
                                <td>{{ o.pile_id ? pileCode(o.pile_id) : '-' }}</td>
                                <td>
                                    <template v-if="o.queueStatus">前有 {{ o.queueStatus.waiting_count_ahead }} 辆车</template>
                                    <button v-else class="btn btn-sm" style="background:#e8f0fe" @click="checkQueue(o)">查看</button>
                                </td>
                                <td style="white-space:nowrap">
                                    <button v-if="o.status==='WAITING'" class="btn btn-sm btn-primary" @click="openModify(o)">修改</button>
                                    <button v-if="o.status==='WAITING'||o.status==='QUEUED'" class="btn btn-sm btn-danger" @click="doCancelOrder(o.id)" style="margin-left:4px">取消</button>
                                    <button v-if="o.status==='CHARGING'" class="btn btn-sm btn-warning" @click="doEndCharging(o.id)" style="margin-left:4px">结束充电</button>
                                    <button v-if="o.status==='CHARGING'" class="btn btn-sm btn-danger" @click="doCancelOrder(o.id)" style="margin-left:4px">取消充电</button>
                                    <button v-if="o.status==='COMPLETED'||o.status==='FAULT_INTERRUPTED'" class="btn btn-sm" style="background:#e8f0fe" @click="viewDetail(o.id)">查看详单</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-if="!myOrders.length && !loading" style="color:#80868b;padding:24px;text-align:center">
                        暂无订单，请先 <a href="javascript:void(0)" @click="tab='submit'" style="color:#1a73e8">提交充电请求</a>
                    </div>
                </div>

                <!-- Modify Dialog -->
                <div v-if="modifyOrder" class="card" style="border:2px solid #1a73e8">
                    <h3>修改订单 #{{ modifyOrder.id }} ({{ modifyOrder.queue_number }})</h3>
                    <div class="alert alert-info">
                        <strong>修改规则：</strong><br>
                        · 等候区改模式 → 重新排号，排到新模式队尾<br>
                        · 等候区改电量 → 排队号不变<br>
                        · 充电区（排队中/充电中）→ 不可修改，需先取消
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>充电模式</label>
                            <select v-model="modifyForm.new_mode">
                                <option :value="null">不修改</option>
                                <option value="F">快充 (30度/小时)</option>
                                <option value="T">慢充 (10度/小时)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>充电量 (度)</label>
                            <input v-model.number="modifyForm.new_kwh" type="number" step="0.1" min="1">
                        </div>
                    </div>
                    <button class="btn btn-primary" @click="doModifyOrder">确认修改</button>
                    <button class="btn" style="margin-left:8px;background:#f1f3f4" @click="modifyOrder=null">取消</button>
                </div>

                <!-- View Detail -->
                <div v-if="tab==='detail'" class="card">
                    <h3>充电详单</h3>
                    <div class="form-row">
                        <div class="form-group"><label>订单ID</label><input v-model.number="detailOrderId"></div>
                        <div class="form-group" style="display:flex;align-items:flex-end"><button class="btn btn-primary" @click="viewDetail(detailOrderId)">查询</button></div>
                    </div>
                    <div v-if="detailData" style="margin-top:16px">
                        <table>
                            <tr><td><strong>详单编号</strong></td><td>{{ detailData.id }}</td><td><strong>生成时间</strong></td><td>{{ detailData.created_at }}</td></tr>
                            <tr><td><strong>订单ID</strong></td><td>{{ detailData.order_id }}</td><td><strong>充电桩编号</strong></td><td>{{ pileCode(detailData.pile_id) }}</td></tr>
                            <tr><td><strong>充电电量</strong></td><td>{{ detailData.total_kwh }} 度</td><td><strong>充电时长</strong></td><td>{{ detailData.charge_duration_hours.toFixed(2) }} 小时</td></tr>
                            <tr><td><strong>启动时间</strong></td><td>{{ detailData.start_time }}</td><td><strong>停止时间</strong></td><td>{{ detailData.end_time }}</td></tr>
                            <tr><td><strong>峰时电量/费用</strong></td><td>{{ detailData.peak_kwh }} 度 / {{ detailData.peak_fee.toFixed(2) }} 元</td><td><strong>平时电量/费用</strong></td><td>{{ detailData.normal_kwh }} 度 / {{ detailData.normal_fee.toFixed(2) }} 元</td></tr>
                            <tr><td><strong>谷时电量/费用</strong></td><td>{{ detailData.valley_kwh }} 度 / {{ detailData.valley_fee.toFixed(2) }} 元</td><td><strong>服务费用</strong></td><td>{{ detailData.service_fee.toFixed(2) }} 元</td></tr>
                            <tr style="background:#e8f0fe"><td><strong>充电费用</strong></td><td>{{ (detailData.charging_fee || detailData.peak_fee+detailData.normal_fee+detailData.valley_fee).toFixed(2) }} 元</td><td><strong>故障中断</strong></td><td>{{ detailData.is_fault_interrupted ? '是' : '否' }}</td></tr>
                            <tr style="font-size:18px;font-weight:bold;background:#d2e3fc"><td colspan="2">总费用: {{ detailData.total_fee.toFixed(2) }} 元</td><td colspan="2"></td></tr>
                        </table>
                    </div>
                </div>

                <!-- Piles Status -->
                <div v-if="tab==='piles'" class="card">
                    <h3>充电桩实时状态 <button class="btn btn-sm btn-primary" @click="loadPiles" style="margin-left:12px">刷新</button></h3>
                    <div class="grid-5">
                        <div v-for="p in piles" :key="p.id" class="pile-indicator" :class="p.status.toLowerCase()">
                            <strong>{{ p.pile_code }}</strong><br>
                            <small>{{ p.mode==='F'?'快充':'慢充' }} | {{ p.power_rate }}度/h</small><br>
                            <span class="status-badge" style="margin-top:4px">{{ pileStatusMap[p.status] || p.status }}</span><br>
                            <small>累计{{ p.total_charge_count }}次 | {{ p.total_charge_kwh.toFixed(1) }}度</small>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ====== ADMIN TABS ====== -->
            <template v-if="user.role==='admin'">
                <div class="tabs">
                    <button class="tab" :class="{active: tab==='overview'}" @click="switchTab('overview')">监控总览</button>
                    <button class="tab" :class="{active: tab==='manage'}" @click="switchTab('manage')">充电桩管理</button>
                    <button class="tab" :class="{active: tab==='waiting'}" @click="switchTab('waiting')">等候区</button>
                    <button class="tab" :class="{active: tab==='faults'}" @click="switchTab('faults')">故障管理</button>
                    <button class="tab" :class="{active: tab==='reports'}" @click="switchTab('reports')">报表</button>
                    <button class="tab" :class="{active: tab==='sim'}" @click="switchTab('sim')">仿真控制</button>
                </div>

                <!-- Overview -->
                <div v-if="tab==='overview'" class="card">
                    <h3>充电站运营总览 <button class="btn btn-sm btn-primary" @click="loadPiles" style="margin-left:12px">刷新</button></h3>
                    <div class="grid-5">
                        <div v-for="p in piles" :key="p.id" class="pile-indicator" :class="p.status.toLowerCase()" style="cursor:pointer" @click="loadPileDetail(p.id)">
                            <strong>{{ p.pile_code }}</strong><br>
                            <small>{{ p.mode==='F'?'快充':'慢充' }} | {{ p.power_rate }}度/h</small><br>
                            <span class="status-badge" style="margin-top:4px">{{ pileStatusMap[p.status] || p.status }}</span><br>
                            <small>{{ p.total_charge_count }}次 | {{ p.total_charge_kwh.toFixed(1) }}度</small>
                        </div>
                    </div>
                    <div v-if="pileDetail" style="margin-top:16px;padding:16px;background:#f8f9fa;border-radius:8px">
                        <h4>充电桩 {{ pileDetail.pile_code }} — 等候车辆</h4>
                        <table v-if="pileDetail.queue_vehicles.length">
                            <thead><tr><th>用户</th><th>订单ID</th><th>排队号</th><th>电池容量(度)</th><th>请求量(度)</th><th>状态</th><th>位置</th><th>排队时长</th></tr></thead>
                            <tbody><tr v-for="v in pileDetail.queue_vehicles" :key="v.order_id">
                                <td>{{ v.username || (v.user_id ? 'ID:'+v.user_id : '-') }}</td><td>{{ v.order_id }}</td><td><strong>{{ v.queue_number }}</strong></td>
                                <td>{{ v.battery_capacity }}</td><td>{{ v.requested_kwh }}</td>
                                <td>{{ v.is_charging?'充电中':'等待中' }}</td><td>#{{ v.position }}</td>
                                <td><small>{{ (v.queue_duration_minutes || 0).toFixed(1) }} 分钟</small></td>
                            </tr></tbody>
                        </table>
                        <div v-else>暂无等候车辆</div>
                    </div>
                </div>

                <!-- Manage -->
                <div v-if="tab==='manage'" class="card">
                    <h3>充电桩管理</h3>
                    <table>
                        <thead><tr><th>编号</th><th>模式</th><th>功率(度/h)</th><th>状态</th><th>累计次数</th><th>累计电量(度)</th><th>累计时长(h)</th><th>操作</th></tr></thead>
                        <tbody><tr v-for="p in piles" :key="p.id">
                            <td><strong>{{ p.pile_code }}</strong></td>
                            <td>{{ p.mode==='F'?'快充':'慢充' }}</td><td>{{ p.power_rate }}</td>
                            <td><span class="status-badge" :class="p.status==='IDLE'?'status-CHARGING':p.status==='CHARGING'?'status-CHARGING':p.status==='BROKEN'?'status-CANCELLED':'status-CANCELLED'">{{ pileStatusMap[p.status] || p.status }}</span></td>
                            <td>{{ p.total_charge_count }}</td><td>{{ p.total_charge_kwh.toFixed(1) }}</td><td>{{ p.total_charge_duration.toFixed(2) }}</td>
                            <td style="white-space:nowrap">
                                <button v-if="p.status==='STOPPED'||p.status==='BROKEN'" class="btn btn-sm btn-success" @click="doStartPile(p.id)">启动</button>
                                <button v-if="p.status==='IDLE'||p.status==='CHARGING'" class="btn btn-sm btn-danger" @click="doStopPile(p.id)">停止</button>
                            </td>
                        </tr></tbody>
                    </table>
                </div>

                <!-- Waiting Area -->
                <div v-if="tab==='waiting'" class="card">
                    <h3>等候区车辆 <button class="btn btn-sm btn-primary" @click="loadWaitingArea" style="margin-left:12px">刷新</button></h3>
                    <table v-if="waitingList.length">
                        <thead><tr><th>用户</th><th>订单ID</th><th>排队号</th><th>模式</th><th>电量(度)</th><th>位置</th><th>排队时长</th></tr></thead>
                        <tbody><tr v-for="w in waitingList" :key="w.order_id">
                            <td>{{ w.username || (w.user_id ? 'ID:'+w.user_id : '-') }}</td><td>{{ w.order_id }}</td><td><strong>{{ w.queue_number }}</strong></td>
                            <td>{{ w.mode==='F'?'快充':'慢充' }}</td><td>{{ w.requested_kwh }}</td><td>#{{ w.position }}</td><td>{{ (w.queue_duration_minutes || 0).toFixed(1) }} 分钟</td>
                        </tr></tbody>
                    </table>
                    <div v-else style="color:#80868b;padding:24px;text-align:center">等候区暂无车辆</div>
                </div>

                <!-- Faults -->
                <div v-if="tab==='faults'">
                    <div class="card">
                        <h3>故障操作</h3>
                        <div class="form-row">
                            <div class="form-group"><label>充电桩编号</label>
                                <select v-model.number="faultForm.pile_id">
                                    <option v-for="p in piles" :key="p.id" :value="p.id">{{ p.pile_code }}（{{ p.mode==='F'?'快充':'慢充' }}）</option>
                                </select>
                            </div>
                            <div class="form-group"><label>调度策略</label>
                                <select v-model="faultForm.strategy">
                                    <option value="PRIORITY">优先级调度 (故障车优先)</option>
                                    <option value="TIME_ORDER">时间顺序调度 (按排队号合并)</option>
                                </select>
                            </div>
                            <div class="form-group" style="display:flex;align-items:flex-end;gap:8px">
                                <button class="btn btn-danger" @click="doReportFault">上报故障</button>
                                <button class="btn btn-success" @click="doRecoverPile">故障恢复</button>
                            </div>
                        </div>
                        <!-- 调度去向详情 -->
                        <div v-if="faultDispatchLog.length" style="margin-top:12px;padding:12px;background:#f8f9fa;border-radius:8px">
                            <h4 style="margin:0 0 8px 0">调度去向</h4>
                            <table style="font-size:13px">
                                <thead><tr><th>排队号</th><th>操作</th><th>详情</th></tr></thead>
                                <tbody><tr v-for="item in faultDispatchLog" :key="item.queue_number" :style="{background: item.action==='充电中断'?'#fce8e6':item.action.includes('等候区')?'#fff3cd':''}">
                                    <td><strong>{{ item.queue_number }}</strong></td>
                                    <td><span class="status-badge" :class="item.action==='充电中断'?'status-CANCELLED':item.action.includes('等候区')?'status-WAITING':'status-CHARGING'">{{ item.action }}</span></td>
                                    <td>{{ item.detail }}</td>
                                </tr></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card">
                        <h3>故障记录 <button class="btn btn-sm btn-primary" @click="loadFaults" style="margin-left:12px">刷新</button></h3>
                        <table v-if="faults.length">
                            <thead><tr><th>ID</th><th>桩ID</th><th>故障时间</th><th>恢复时间</th><th>策略</th><th>影响订单</th><th>状态</th></tr></thead>
                            <tbody><tr v-for="f in faults" :key="f.id">
                                <td>{{ f.id }}</td><td>{{ pileCode(f.pile_id) }}</td><td>{{ f.fault_time }}</td><td>{{ f.resolved_time || '-' }}</td>
                                <td>{{ f.strategy_used || '-' }}</td><td>{{ f.affected_order_count }}</td>
                                <td><span class="status-badge" :class="f.status==='ACTIVE'?'status-CANCELLED':'status-COMPLETED'">{{ f.status }}</span></td>
                            </tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- Reports -->
                <div v-if="tab==='reports'">
                    <div class="card">
                        <h3>生成报表</h3>
                        <div class="form-row">
                            <div class="form-group"><label>报表类型</label>
                                <select v-model="reportType"><option value="DAILY">日报</option><option value="WEEKLY">周报</option><option value="MONTHLY">月报</option></select>
                            </div>
                            <div class="form-group" style="display:flex;align-items:flex-end"><button class="btn btn-primary" @click="doGenerateReport">生成报表</button></div>
                        </div>
                    </div>
                    <div class="card">
                        <h3>报表列表 <button class="btn btn-sm btn-primary" @click="loadReports" style="margin-left:12px">刷新</button></h3>
                        <table v-if="reports.length">
                            <thead><tr><th>ID</th><th>类型</th><th>开始</th><th>结束</th><th>生成时间</th><th>总次数</th><th>总电量(度)</th><th>总费用(元)</th><th>操作</th></tr></thead>
                            <tbody><tr v-for="r in reports" :key="r.id">
                                <td>{{ r.id }}</td><td>{{ r.report_type }}</td><td>{{ r.period_start }}</td><td>{{ r.period_end }}</td>
                                <td>{{ r.generated_at }}</td>
                                <td>{{ r.report_data.summary?.total_charges || 0 }}</td>
                                <td>{{ (r.report_data.summary?.total_kwh || 0).toFixed(2) }}</td>
                                <td><strong>{{ (r.report_data.summary?.total_fee || 0).toFixed(2) }}</strong></td>
                                <td><button class="btn btn-sm" style="background:#e8f0fe" @click="showReportDetail(r)">详情</button></td>
                            </tr></tbody>
                        </table>
                    </div>
                    <!-- Report Detail Modal -->
                    <div v-if="reportDetail" class="card" style="border:2px solid #1a73e8">
                        <h3>报表详情 #{{ reportDetail.id }} <button class="btn btn-sm" style="float:right" @click="reportDetail=null">关闭</button></h3>
                        <p>{{ reportDetail.report_type }} | {{ reportDetail.period_start }} ~ {{ reportDetail.period_end }}</p>
                        <table>
                            <thead><tr><th>充电桩编号</th><th>充电次数</th><th>总时长(h)</th><th>总电量(度)</th><th>充电费(元)</th><th>服务费(元)</th><th>总费用(元)</th></tr></thead>
                            <tbody><tr v-for="p in (reportDetail.report_data.piles||[])">
                                <td>{{ p.pile_code || pileCode(p.pile_id) }}</td><td>{{ p.charge_count }}</td><td>{{ p.total_duration.toFixed(2) }}</td>
                                <td>{{ p.total_kwh.toFixed(2) }}</td><td>{{ ((p.total_peak_fee||0)+(p.total_normal_fee||0)+(p.total_valley_fee||0)).toFixed(2) }}</td>
                                <td>{{ (p.total_service_fee||0).toFixed(2) }}</td><td><strong>{{ (p.total_fee||0).toFixed(2) }}</strong></td>
                            </tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- Simulation -->
                <div v-if="tab==='sim'" class="card">
                    <h3>仿真控制 <button class="btn btn-sm btn-primary" @click="loadClock" style="margin-left:12px">刷新时间</button></h3>
                    <div style="display:flex;align-items:center;gap:16px;padding:16px;background:#f8f9fa;border-radius:8px;margin-bottom:16px">
                        <div><strong>虚拟时间:</strong> <span style="font-size:18px;color:#1a73e8">{{ simClock.current_time || '-' }}</span></div>
                        <div>每Tick: {{ simClock.tick_minutes }} 分钟</div>
                    </div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap">
                        <button v-if="!autoTickRunning" class="btn btn-success" @click="startAutoTick">开始自动流转</button>
                        <button v-else class="btn btn-danger" @click="stopAutoTick">暂停自动流转</button>
                        <select v-model.number="autoTickIntervalMs" :disabled="autoTickRunning" style="width:150px">
                            <option :value="500">0.5秒 / Tick</option>
                            <option :value="1000">1秒 / Tick</option>
                            <option :value="2000">2秒 / Tick</option>
                            <option :value="5000">5秒 / Tick</option>
                        </select>
                        <button class="btn btn-primary" @click="doTick">执行 1 Tick</button>
                        <button class="btn btn-primary" @click="doTickN(4)">快速 4 Tick (1小时)</button>
                        <button class="btn btn-primary" @click="doTickN(8)">快速 8 Tick (2小时)</button>
                        <button class="btn btn-primary" @click="doTickN(16)">快速 16 Tick (4小时)</button>
                        <button class="btn" style="background:#f9ab00;color:#333" @click="doTickN(96)">快进 24小时</button>
                    </div>
                    <div v-if="simEvents.length" style="margin-top:16px">
                        <h4>最近事件</h4>
                        <div v-for="(evt,i) in simEvents.slice(-10)" :key="i" class="alert alert-info">{{ evt }}</div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
const { createApp, ref, reactive } = Vue;
createApp({
    setup() {
        const statusMap = {
            WAITING:'等候中', QUEUED:'排队中', CHARGING:'充电中', COMPLETED:'已完成',
            CANCELLED:'已取消', FAULT_INTERRUPTED:'故障中断'
        };
        const pileStatusMap = {
            IDLE: '空闲',
            CHARGING: '充电中',
            BROKEN: '故障',
            STOPPED: '已停止'
        };

        // Auth
        const loggedIn = ref(!!getToken());
        const user = ref(JSON.parse(sessionStorage.getItem('user')||'{}'));
        const loginMode = ref('login');
        const loginForm = reactive({username:'',password:'',role:'client'});
        const loginMsg = ref(''); const loginMsgType = ref('info');

        async function doLogin() {
            loginMsg.value='';
            resetAllState();
            try {
                if (loginMode.value === 'register' && loginForm.role === 'admin') {
                    throw new Error('管理员账号不能在前端注册，请选择管理员客户端后使用已有管理员账号登录');
                }
                const fn = loginMode.value==='login' ? API.login : API.register;
                const r = await fn(loginForm.username, loginForm.password, loginMode.value==='register' ? 'client' : loginForm.role);
                setToken(r.access_token);
                const me = await API.getMe();
                if (loginMode.value === 'login' && me.role !== loginForm.role) {
                    clearToken();
                    throw new Error(`该账号是${me.role==='admin'?'管理员':'客户'}账号，请切换到对应客户端登录`);
                }
                user.value = me;
                sessionStorage.setItem('user', JSON.stringify(me));
                loggedIn.value = true;
                tab.value = user.value.role==='admin'?'overview':'submit';
                await loadPiles();
                if (user.value.role === 'client') { await loadMyVehicles(); }
                if (user.value.role === 'admin') { await loadClock(); }
            } catch(e) { loginMsg.value=e.message; loginMsgType.value='error'; }
        }

        function resetAllState() {
            submitResult.value = null;
            myOrders.value = [];
            myVehicles.value = [];
            detailData.value = null; detailOrderId.value = null;
            modifyOrder.value = null;
            pileDetail.value = null;
            waitingList.value = [];
            faults.value = [];
            faultDispatchLog.value = [];
            reports.value = [];
            reportDetail.value = null;
            simEvents.value = [];
            piles.value = [];
            globalMsg.value = '';
            if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
        }

        function logout() { clearToken(); resetAllState(); loggedIn.value=false; user.value={}; }

        // Shared state
        const tab = ref('submit');
        const globalMsg = ref(''); const globalMsgType = ref('info');
        const loading = ref(false);
        const piles = ref([]);
        const statusMapRef = statusMap;

        function showMsg(msg, type='success') { globalMsg.value=msg; globalMsgType.value=type; setTimeout(()=>globalMsg.value='', 4000); }

        function pileCode(pileId) {
            const pile = piles.value.find(p => p.id === pileId);
            return pile ? pile.pile_code : `#${pileId}`;
        }

        let autoRefreshTimer = null;

        async function switchTab(t) {
            tab.value = t;
            if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
            if (t !== 'detail') { detailData.value = null; detailOrderId.value = null; }
            if (t==='submit'||t==='vehicles') await loadMyVehicles();
            if (t==='orders') { await loadMyOrders(); autoRefreshTimer = setInterval(loadMyOrders, 5000); }
            if (t==='piles'||t==='overview'||t==='manage') { await loadPiles(); autoRefreshTimer = setInterval(loadPiles, 5000); }
            if (t==='waiting') { await loadWaitingArea(); autoRefreshTimer = setInterval(loadWaitingArea, 5000); }
            if (t==='faults') { await loadPiles(); await loadFaults(); }
            if (t==='reports') await loadReports();
            if (t==='sim') await loadClock();
        }

        // Client: Vehicles
        const myVehicles = ref([]);
        const vehicleForm = reactive({license_plate:'', battery_capacity:60});

        async function loadMyVehicles() {
            try { myVehicles.value = await API.listMyVehicles(); }
            catch(e) { showMsg(e.message,'error'); }
        }

        async function doCreateVehicle() {
            if(!vehicleForm.license_plate||!vehicleForm.battery_capacity) return showMsg('请填写车牌和电池容量','error');
            try {
                await API.createVehicle(vehicleForm.license_plate, vehicleForm.battery_capacity);
                showMsg('车辆创建成功');
                vehicleForm.license_plate = '';
                await loadMyVehicles();
            } catch(e) { showMsg(e.message,'error'); }
        }

        // Client: Submit
        const submitForm = reactive({vehicle_id:0, mode:'F', requested_kwh:20});
        const submitResult = ref(null);

        async function doSubmitOrder() {
            loading.value=true; submitResult.value=null;
            try {
                submitResult.value = await API.submitOrder(submitForm.vehicle_id, submitForm.mode, submitForm.requested_kwh);
                showMsg('提交成功! 排队号: '+submitResult.value.queue_number);
            } catch(e) { showMsg(e.message, 'error'); }
            finally { loading.value=false; }
        }

        // Client: Orders
        const myOrders = ref([]);

        async function loadMyOrders() {
            loading.value=true;
            try {
                if (!piles.value.length) await loadPiles();
                myOrders.value = await API.listMyOrders();
            }
            catch(e) { showMsg(e.message,'error'); }
            finally { loading.value=false; }
        }

        async function doCancelOrder(id) {
            if(!confirm('确认取消订单 #'+id+'?')) return;
            try { await API.cancelOrder(id); showMsg('已取消'); await loadMyOrders(); await loadPiles(); }
            catch(e) { showMsg(e.message,'error'); }
        }

        async function doEndCharging(id) {
            if(!confirm('确认结束订单 #'+id+' 的充电?')) return;
            try { await API.endCharging(id); showMsg('充电已结束'); await loadMyOrders(); await loadPiles(); }
            catch(e) { showMsg(e.message,'error'); }
        }

        async function checkQueue(o) {
            try {
                const s = await API.getQueueStatus(o.id);
                o.queueStatus = s;
                myOrders.value = [...myOrders.value]; // trigger reactivity
            } catch(e) { showMsg(e.message,'error'); }
        }

        // Client: Modify
        const modifyOrder = ref(null);
        const modifyForm = reactive({new_mode:null, new_kwh:null});

        function openModify(o) {
            modifyOrder.value = o;
            modifyForm.new_mode = null;
            modifyForm.new_kwh = o.requested_kwh;
        }

        async function doModifyOrder() {
            if(!modifyOrder.value) return;
            try {
                await API.modifyOrder(modifyOrder.value.id, {
                    new_mode: modifyForm.new_mode || undefined,
                    new_kwh: modifyForm.new_kwh || undefined,
                });
                showMsg('修改成功');
                modifyOrder.value = null;
                await loadMyOrders();
            } catch(e) { showMsg(e.message,'error'); }
        }

        // Client: Detail
        const detailOrderId = ref(null);
        const detailData = ref(null);

        async function viewDetail(orderId) {
            detailOrderId.value = orderId;
            tab.value = 'detail';
            try {
                if (!piles.value.length) await loadPiles();
                detailData.value = await API.getDetail(orderId);
            }
            catch(e) { showMsg(e.message,'error'); detailData.value=null; }
        }

        // Piles (shared)
        async function loadPiles() {
            try { piles.value = await API.listPiles(); } catch(e) { showMsg(e.message,'error'); }
        }

        // Admin: Pile Detail
        const pileDetail = ref(null);
        async function loadPileDetail(pileId) {
            try { pileDetail.value = await API.getPile(pileId); } catch(e) { showMsg(e.message,'error'); }
        }

        // Admin: Manage
        async function doStartPile(id) {
            try { await API.startPile(id); showMsg('已启动'); await loadPiles(); } catch(e) { showMsg(e.message,'error'); }
        }

        async function doStopPile(id) {
            try { await API.stopPile(id); showMsg('已停止'); await loadPiles(); } catch(e) { showMsg(e.message,'error'); }
        }

        // Admin: Waiting Area
        const waitingList = ref([]);
        async function loadWaitingArea() {
            try { waitingList.value = await API.getWaitingArea(); } catch(e) { showMsg(e.message,'error'); }
        }

        // Admin: Faults
        const faultForm = reactive({pile_id:1, strategy:'PRIORITY'});
        const faults = ref([]);
        const faultDispatchLog = ref([]);

        async function doReportFault() {
            try {
                const r = await API.reportFault(faultForm.pile_id, faultForm.strategy);
                faultDispatchLog.value = r.detail?.dispatch_log || [];
                showMsg(r.message); await loadFaults(); await loadPiles();
            } catch(e) { showMsg(e.message,'error'); faultDispatchLog.value = []; }
        }

        async function doRecoverPile() {
            try {
                const r = await API.recoverPile(faultForm.pile_id);
                showMsg(r.message); await loadFaults(); await loadPiles();
            } catch(e) { showMsg(e.message,'error'); }
        }

        async function loadFaults() {
            try { faults.value = await API.listFaults(); } catch(e) { showMsg(e.message,'error'); }
        }

        // Admin: Reports
        const reportType = ref('DAILY');
        const reports = ref([]);
        const reportDetail = ref(null);

        async function doGenerateReport() {
            try {
                const r = await API.generateReport(reportType.value);
                reportDetail.value = r;
                showMsg('报表已生成 (ID: '+r.id+')'); await loadReports();
            } catch(e) { showMsg(e.message,'error'); }
        }

        async function loadReports() {
            try { reports.value = await API.listReports(); } catch(e) { showMsg(e.message,'error'); }
        }

        function showReportDetail(r) {
            reportDetail.value = r;
        }

        // Admin: Simulation
        const simClock = ref({current_time:'', tick_minutes:15});
        const simEvents = ref([]);
        const autoTickRunning = ref(false);
        const autoTickIntervalMs = ref(1000);
        let autoTickTimer = null;
        let autoTickBusy = false;

        async function loadClock() {
            try { simClock.value = await API.getClock(); } catch(e) { showMsg(e.message,'error'); }
        }

        async function doTick() {
            try {
                const r = await API.tick();
                simEvents.value = [...simEvents.value, ...(r.detail?.events||[]), r.message];
                await loadClock(); await loadPiles();
                showMsg(r.message);
            } catch(e) { showMsg(e.message,'error'); }
        }

        async function runAutoTickOnce() {
            if (autoTickBusy) return;
            autoTickBusy = true;
            try {
                const r = await API.tick();
                simEvents.value = [...simEvents.value, ...(r.detail?.events||[])];
                await loadClock();
                await loadPiles();
                if (tab.value === 'waiting') await loadWaitingArea();
                if (tab.value === 'reports') await loadReports();
            } catch(e) {
                showMsg(e.message, 'error');
                stopAutoTick();
            } finally {
                autoTickBusy = false;
            }
        }

        function startAutoTick() {
            if (autoTickTimer) return;
            autoTickRunning.value = true;
            showMsg('自动流转已开始');
            runAutoTickOnce();
            autoTickTimer = setInterval(runAutoTickOnce, autoTickIntervalMs.value);
        }

        function stopAutoTick() {
            if (autoTickTimer) {
                clearInterval(autoTickTimer);
                autoTickTimer = null;
            }
            autoTickRunning.value = false;
            showMsg('自动流转已暂停', 'info');
        }

        async function doTickN(n) {
            for(let i=0; i<n; i++) {
                try {
                    const r = await API.tick();
                    simEvents.value = [...simEvents.value, ...(r.detail?.events||[])];
                } catch(e) { showMsg(e.message,'error'); break; }
            }
            await loadClock(); await loadPiles();
            showMsg('已完成 '+n+' 次Tick');
        }

        if (loggedIn.value) {
            loadPiles();
            if (user.value.role === 'admin') loadClock();
        }

        return {
            statusMap, pileStatusMap, loggedIn, user, loginMode, loginForm, loginMsg, loginMsgType, doLogin, logout,
            tab, globalMsg, globalMsgType, loading, switchTab, showMsg, pileCode,
            myVehicles, vehicleForm, loadMyVehicles, doCreateVehicle,
            submitForm, submitResult, doSubmitOrder,
            myOrders, loadMyOrders, doCancelOrder, doEndCharging, checkQueue,
            modifyOrder, modifyForm, openModify, doModifyOrder,
            detailOrderId, detailData, viewDetail,
            piles, loadPiles,
            pileDetail, loadPileDetail, doStartPile, doStopPile,
            waitingList, loadWaitingArea,
            faultForm, faults, faultDispatchLog, doReportFault, doRecoverPile, loadFaults,
            reportType, reports, reportDetail, doGenerateReport, loadReports, showReportDetail,
            simClock, simEvents, autoTickRunning, autoTickIntervalMs, loadClock, doTick, doTickN, startAutoTick, stopAutoTick,
        };
    }
}).mount('#app');
</script>
</body>
</html>
